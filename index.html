<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0d1117">
  <title>SKEDULER LIVE</title>
  <style>
    * { box-sizing: border-box; }
    
    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #7d8590;
      --accent: #58a6ff;
      --live-red: #f85149;
      --live-green: #3fb950;
    }
    
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Avenir', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    
    /* ===== HEADER ===== */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 12px 16px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      min-height: 48px;
    }
    
    .header-left {
      display: flex;
      align-items: center;
      gap: 8px;
      justify-self: start;
    }
    
    .header-logo {
      display: flex;
      align-items: center;
    }

    .header-logo img {
      height: 22px;
      width: auto;
    }
    
    .header-center {
      justify-self: center;
      text-align: center;
    }
    
    .channel-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      max-width: 300px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    
    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
      justify-self: end;
    }
    
    /* ===== LIVE INDICATOR ===== */
    .live-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    
    .live-badge.live {
      background: rgba(248, 81, 73, 0.15);
      color: var(--live-red);
      border: 1px solid rgba(248, 81, 73, 0.3);
    }
    
    .live-badge.live .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--live-red);
      animation: pulse 1.5s ease-in-out infinite;
    }
    
    .live-badge.manual {
      background: rgba(125, 133, 144, 0.15);
      color: var(--muted);
      border: 1px solid rgba(125, 133, 144, 0.3);
    }
    
    .live-badge.manual .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
    }
    
    .live-badge.offline {
      background: rgba(248, 81, 73, 0.1);
      color: var(--live-red);
      border: 1px solid rgba(248, 81, 73, 0.2);
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.9); }
    }
    
    /* ===== SHARPIE TOGGLE ===== */
    .header-progress-btn {
      width: 28px; height: 28px; padding: 4px; border-radius: 50%; border: 2px solid #f44336;
      background: #f44336; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s ease;
    }
    .header-progress-btn:hover { filter: brightness(1.1); }
    .header-progress-btn.lines-hidden { background: transparent; border-color: #f44336; }
    .header-progress-btn.lines-hidden:hover { background: rgba(244,67,54,0.1); }
    .header-progress-btn:not(.lines-hidden) { background: #f44336; }
    
    /* QR Code toggle */
    .qr-btn { width: 28px; height: 28px; padding: 0; border-radius: 50%; border: 2px solid var(--live-red, #f85149); background: transparent; color: var(--text, #e5e7eb); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s ease; }
    .qr-btn:hover { background: rgba(248, 81, 73, 0.15); }
    .qr-btn.active { background: var(--live-red, #f85149); color: white; }
    .qr-btn svg { width: 14px; height: 14px; }
    .qr-popover { display: none; position: fixed; top: 50px; right: 16px; background: white; border-radius: 12px; padding: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); z-index: 9999; text-align: center; min-width: 220px; }
    .qr-popover.visible { display: block; }
    .qr-popover img { width: 180px; height: 180px; display: block; margin: 0 auto 8px; border-radius: 4px; }
    .qr-popover .qr-label { font-size: 11px; font-weight: 600; color: #374151; letter-spacing: 0.5px; margin-bottom: 4px; }
    .qr-popover .qr-url { font-size: 10px; color: #6b7280; word-break: break-all; max-width: 200px; margin: 0 auto; }
    
    /* ===== CONTENT ===== */
    .content {
      padding: 0;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      background: #000;
    }
    #schedule-container {
      width: 100%;
    }
    /* Schedule sections get horizontal padding, tabs stay flush */
    .content .broadcast-day-section {
      padding: 16px;
    }
    
    .loading, .error {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      text-align: center;
      padding: 24px;
    }
    
    .loading h2, .error h2 {
      font-size: 18px;
      margin: 0 0 8px;
    }
    
    .loading p, .error p {
      color: var(--muted);
      margin: 0;
    }
    
    .error h2 { color: var(--live-red); }
    
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 16px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    /* ===== SCHEDULE CONTAINER ===== */
    #schedule-container {
      background: #000;
      border-radius: 8px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      position: relative;
    }
    
    #schedule-container table {
      border-collapse: collapse;
      background: #000;
    }
    
    #schedule-container .schedule-scroll {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      background: #000;
    }
    
    
    /* ===== SHARPIE LINES ===== */
    .sharpie-line-element {
      position: absolute;
      height: 4px;
      background: #f44336;
      pointer-events: none;
      z-index: 500;
    }
    
    body.sharpie-hidden .sharpie-line-element,
    body.sharpie-hidden .row-complete::after {
      display: none;
    }

    /* Clip completed lines to the table boundary */
    #schedule-container table {
      overflow: hidden;
    }

    /* Show baked-in completed-line spans when sharpie is visible */
    body.show-progress .completed-line {
      display: block;
      width: 100vw;
    }
    /* Hide them when sharpie is toggled off */
    body.sharpie-hidden .completed-line {
      display: none;
    }
    
    /* ===== SCHEDULE HEADER IMAGE ===== */
    .header-image {
      text-align: center;
      margin-bottom: 12px;
    }
    
    .header-image img {
      max-width: 100%;
      height: auto;
      display: block;
      margin: 0 auto;
    }
    
    /* ===== TAG PILLS ===== */
    .tagsBox {
      position: absolute;
      inset: 0;
      display: flex;
      pointer-events: none;
    }
    
    .tags-pills {
      flex: 1;
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
      padding: 4px;
      position: relative;
      z-index: 11;
      pointer-events: none;
      align-items: flex-start;
      align-content: flex-start;
      justify-content: flex-start;
    }
    
    .tag-pill {
      background: var(--panel, #ffffff);
      color: var(--text, #111827);
      padding: 2px 6px 2px 2px;
      border-radius: 999px;
      border: 1px solid #94a3b8;
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.3px;
      position: relative;
      box-sizing: border-box;
      white-space: nowrap;
      flex: 0 0 auto;
    }
    
    .tag-pill span {
      text-transform: none;
      font-size: inherit;
    }
    
    .tag-pill.image-tag img {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      object-fit: cover;
    }
    
    /* Vertical alignment for tags cells */
    td[data-valign="top"] .tags-pills { align-items: flex-start; align-content: flex-start; }
    td[data-valign="middle"] .tags-pills { align-items: center; align-content: center; }
    td[data-valign="bottom"] .tags-pills { align-items: flex-end; align-content: flex-end; }
    /* Horizontal alignment for tags cells */
    td[data-align="left"] .tags-pills { justify-content: flex-start; }
    td[data-align="center"] .tags-pills { justify-content: center; }
    td[data-align="right"] .tags-pills { justify-content: flex-end; }
    
    .tag-pill .tag-dummy-circle {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: inline-block;
      background: transparent;
    }
    
    .tag-pill.minor-tag {
      border: 2px solid #dc2626;
      box-shadow: 0 0 0 1px rgba(220, 38, 38, 0.3);
    }
    
    .tag-pill .tag-x {
      display: none;
    }
    
    /* ===== FOOTER ===== */
    .updated-at {
      text-align: center;
      padding: 12px;
      font-size: 11px;
      color: var(--muted);
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <div class="channel-name" id="channelName">Loading...</div>
    </div>

    <div class="header-center">
      <div class="header-logo">
        <img src="logo-pro.png" alt="SKEDULER PRO" />
      </div>
    </div>
    
    <div class="header-right">
      <div class="live-badge manual" id="liveBadge">
        <span id="liveText">LIVE</span>
        <span class="live-dot"></span>
      </div>
      <button class="qr-btn" id="qrBtn" title="Show QR Code">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
          <rect x="14" y="14" width="3" height="3"/><rect x="18" y="14" width="3" height="3"/><rect x="14" y="18" width="3" height="3"/><rect x="18" y="18" width="3" height="3"/>
        </svg>
      </button>
      <button class="header-progress-btn" id="sharpieToggle" title="Toggle Progress">
        <svg width="18" height="18" viewBox="195 40 100 130"><g transform="rotate(45 245 96)"><path fill="#dd2222" d="m230,66l0,-35q0,-15 12,-21q3,-2 6,0q12,6 12,21l0,35l-30,0z"/><path fill="#e0e0e0" d="m231.5,66l0,75q0,15 6.5,25l14,0q6.5,-10 6.5,-25l0,-75l-27,0z"/><path fill="#bb1111" d="m238,166q-2,10 7,25q9,-15 7,-25l-14,0z"/></g></svg>
      </button>
    </div>
  </div>
  
  <div id="day-tabs-bar"></div>
  <div class="content">
    <div id="loading" class="loading">
      <div class="spinner"></div>
      <h2>Loading Schedule...</h2>
      <p>Please wait</p>
    </div>
    
    <div id="error" class="error" style="display:none;">
      <h2>Schedule Not Found</h2>
      <p>This broadcast link may have expired or been removed.</p>
    </div>
    
    <div id="schedule-container" style="display:none;"></div>
    <div id="updated-at" class="updated-at"></div>
  </div>
  
  <div class="qr-popover" id="qrPopover">
    <div class="qr-label">SCAN TO VIEW SCHEDULE</div>
    <img id="qrImage" alt="QR Code" />
    <div class="qr-url" id="qrUrl"></div>
  </div>

  <script>
    (function() {
    const SUPABASE_URL = window.SKEDULER_CONFIG?.SUPABASE_URL;
    const SUPABASE_ANON_KEY = window.SKEDULER_CONFIG?.SUPABASE_ANON_KEY;

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let broadcastCode = null;
    let broadcastData = null;
    let refreshInterval = null;
    let sharpieVisible = true;
    let _lastUpdatedAt = null; // Track last-known updated_at to skip no-op refreshes
    let _lastContentHash = null; // Track content hash to avoid DOM thrash on identical HTML

    /** Simple fast hash for change detection (djb2) */
    function _quickHash(str) {
      let hash = 5381;
      for (let i = 0; i < str.length; i++) {
        hash = ((hash << 5) + hash) + str.charCodeAt(i);
        hash = hash & hash;
      }
      return hash;
    }

    async function init() {
      const params = new URLSearchParams(window.location.search);
      broadcastCode = params.get('c') || params.get('code') || window.location.pathname.split('/').pop();

      if (!broadcastCode || broadcastCode === 'index.html' || broadcastCode === '' || broadcastCode === 'broadcast-viewer-index.html') {
        showError('No broadcast code provided');
        return;
      }

      // Setup sharpie toggle
      const sharpieToggle = document.getElementById('sharpieToggle');
      sharpieToggle.addEventListener('click', toggleSharpie);

      // Sharpie starts visible — enable show-progress so baked-in completed lines render
      document.body.classList.add('show-progress');

      // Setup QR code toggle
      setupQRCode();

      await loadBroadcast();

      // Auto-refresh every 30 seconds
      refreshInterval = setInterval(loadBroadcast, 30000);
    }
    
    function setupQRCode() {
      const btn = document.getElementById('qrBtn');
      const popover = document.getElementById('qrPopover');
      const qrImage = document.getElementById('qrImage');
      const qrUrlEl = document.getElementById('qrUrl');
      if (!btn || !popover) return;
      const pageUrl = window.location.href;
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const isVisible = popover.classList.toggle('visible');
        btn.classList.toggle('active', isVisible);
        if (isVisible && !qrImage.src) {
          qrImage.src = 'https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=' + encodeURIComponent(pageUrl);
          qrUrlEl.textContent = pageUrl;
        }
      });
      document.addEventListener('click', (e) => {
        if (!popover.contains(e.target) && e.target !== btn) {
          popover.classList.remove('visible');
          btn.classList.remove('active');
        }
      });
    }
    
    function toggleSharpie() {
      sharpieVisible = !sharpieVisible;
      const btn = document.getElementById('sharpieToggle');

      if (sharpieVisible) {
        document.body.classList.remove('sharpie-hidden');
        document.body.classList.add('show-progress');
        btn.classList.remove('lines-hidden');
      } else {
        document.body.classList.add('sharpie-hidden');
        document.body.classList.remove('show-progress');
        btn.classList.add('lines-hidden');
      }
    }
    
    function initDayTabs(container) {
      const tabBar = container.querySelector('.broadcast-day-tabs');
      if (!tabBar) return;

      // Move tab bar to dedicated host div if available
      const tabBarHost = document.getElementById('day-tabs-bar');
      if (tabBarHost) {
        tabBarHost.innerHTML = '';
        tabBarHost.appendChild(tabBar);
      }

      const tabs = tabBar.querySelectorAll('.bday-tab');
      tabs.forEach(function(tab) {
        tab.addEventListener('click', function() {
          var dayId = tab.getAttribute('data-day-id');
          // Hide all sections
          container.querySelectorAll('.broadcast-day-section').forEach(function(s) { s.style.display = 'none'; });
          // Show target section
          var target = container.querySelector('.broadcast-day-section[data-day-id="' + dayId + '"]');
          if (target) target.style.display = 'block';
          // Update active tab
          tabs.forEach(function(t) { t.classList.remove('active'); });
          tab.classList.add('active');
          document.dispatchEvent(new CustomEvent('broadcast-day-changed', { detail: { dayId: dayId } }));

          // Reposition sharpie lines for the newly visible section
          container.querySelectorAll('.sharpie-line-element').forEach(function(el) { el.remove(); });
          if (typeof markedRows !== 'undefined' && markedRows.size > 0) {
            setTimeout(function() {
              markedRows.forEach(function(rowId) {
                var row = container.querySelector('tr[data-id="' + rowId + '"]');
                if (row) {
                  var sec = row.closest('.broadcast-day-section');
                  if (!sec || sec.style.display !== 'none') {
                    addSharpieLineElement(row);
                  }
                }
              });
            }, 50);
          }
        });
      });
    }

    async function loadBroadcast() {
      try {
        // Look up broadcast by code
        const { data: broadcast, error: lookupError } = await supabase
          .from('broadcasts')
          .select('*')
          .eq('code', broadcastCode.toUpperCase())
          .single();

        if (lookupError || !broadcast) {
          showError('Broadcast not found');
          return;
        }

        broadcastData = broadcast;

        // Update channel name (centered)
        const channelName = broadcast.title || 'Untitled';
        document.getElementById('channelName').textContent = channelName;
        document.title = channelName + ' - SKEDULER';

        // Update LIVE badge based on auto_update field
        updateLiveBadge(broadcast.auto_update);

        // ---------------------------------------------------------------
        // OPTIMIZATION: Skip re-fetch if updated_at hasn't changed
        // (the producer updates this timestamp on every push)
        // ---------------------------------------------------------------
        if (_lastUpdatedAt && broadcast.updated_at === _lastUpdatedAt) {
          console.log('[Broadcast] No change since last refresh (updated_at unchanged), skipping fetch');
          return;
        }

        // Fetch HTML from storage
        let htmlPath;
        if (broadcast.channel_number) {
          htmlPath = broadcast.user_id + '/ch' + broadcast.channel_number + '_' + broadcast.file_name + '.html';
        } else {
          htmlPath = broadcast.user_id + '/' + broadcast.file_name + '.html';
        }

        const { data: urlData } = supabase.storage
          .from('schedule-files')
          .getPublicUrl(htmlPath);

        const cacheBuster = Date.now();
        const publicUrl = urlData.publicUrl + '?t=' + cacheBuster;

        console.log('[Broadcast] Fetching:', publicUrl);

        const response = await fetch(publicUrl);
        if (!response.ok) {
          showError('Could not load schedule');
          return;
        }

        const html = await response.text();

        // ---------------------------------------------------------------
        // OPTIMIZATION: Skip DOM replacement if content is identical
        // ---------------------------------------------------------------
        const contentHash = _quickHash(html);
        if (_lastContentHash === contentHash) {
          console.log('[Broadcast] HTML content identical (hash match), skipping DOM update');
          _lastUpdatedAt = broadcast.updated_at;
          document.getElementById('updated-at').textContent = 'Last updated: ' + new Date(broadcast.updated_at).toLocaleString();
          return;
        }

        // ---------------------------------------------------------------
        // Smart DOM update: preserve scroll position & sharpie state
        // ---------------------------------------------------------------
        const container = document.getElementById('schedule-container');

        // Remember scroll position
        const scrollTop = window.scrollY || document.documentElement.scrollTop;
        const scrollLeft = window.scrollX || document.documentElement.scrollLeft;

        // Remember which day tab was active
        const activeTab = container.querySelector('.bday-tab.active');
        const activeDayId = activeTab ? activeTab.getAttribute('data-day-id') : null;

        // Remember sharpie state (managed by realtime, not HTML)
        const savedMarkedRows = new Set(markedRows);

        // Apply new content
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'none';
        container.style.display = 'block';
        container.innerHTML = html;

        // Override inline table-layout:fixed so the actions column doesn't
        // compress the schedule columns — it scrolls off to the right instead.
        container.querySelectorAll('table').forEach(function(tbl) {
          // Sum widths of non-actions cols to preserve schedule column sizes
          var scheduleWidth = 0;
          tbl.querySelectorAll('colgroup col').forEach(function(col) {
            if (col.dataset.key !== 'actions') {
              scheduleWidth += parseFloat(col.style.width) || 0;
            }
          });
          // Switch to auto layout: schedule cols keep their min-width,
          // actions col extends the table past the viewport and scrolls.
          tbl.style.tableLayout = 'auto';
          tbl.style.width = '';
          if (scheduleWidth > 0) {
            tbl.style.minWidth = scheduleWidth + 'px';
          }
          // Give each non-actions col a min-width so auto layout doesn't shrink them
          tbl.querySelectorAll('colgroup col').forEach(function(col) {
            var w = parseFloat(col.style.width);
            if (w && col.dataset.key !== 'actions') {
              col.style.minWidth = w + 'px';
            }
          });
        });

        // Wire up day tabs (scripts injected via innerHTML don't execute)
        initDayTabs(container);

        // Restore active day tab if it still exists
        if (activeDayId) {
          const restoredTab = container.querySelector('.bday-tab[data-day-id="' + activeDayId + '"]');
          if (restoredTab) {
            restoredTab.click(); // This switches visible section and marks active
          }
        }

        // Restore sharpie marks and completed state
        markedRows.clear();
        savedMarkedRows.forEach(function(rowId) {
          markedRows.add(rowId);
          var row = container.querySelector('tr[data-id="' + rowId + '"]');
          if (row) {
            addSharpieLineElement(row);
            markRowComplete(row);
          }
        });

        // Restore scroll position
        window.scrollTo(scrollLeft, scrollTop);

        // Subscribe to live sharpie events from AD/producer (idempotent)
        subscribeToSharpieChannel();

        // Update tracking state
        _lastUpdatedAt = broadcast.updated_at;
        _lastContentHash = contentHash;

        // Show last updated
        const updated = new Date(broadcast.updated_at);
        document.getElementById('updated-at').textContent = 'Last updated: ' + updated.toLocaleString();

      } catch (err) {
        console.error('Load error:', err);
        showError('Failed to load broadcast');
      }
    }
    
    // === SHARPIE LIVE SYNC ===
    let sharpieChannel = null;
    const markedRows = new Set();
    
    function subscribeToSharpieChannel() {
      if (sharpieChannel) return;
      
      sharpieChannel = supabase.channel(`ad-sync-${broadcastCode.toUpperCase()}`, {
        config: { broadcast: { self: false } }
      });
      
      sharpieChannel
        .on('broadcast', { event: 'sharpie-toggle' }, ({ payload }) => {
          if (!payload?.rowId) return;
          const row = document.querySelector(`#schedule-container tr[data-id="${payload.rowId}"]`);
          if (!row) return;

          if (payload.marked) {
            markedRows.add(payload.rowId);
            addSharpieLineElement(row);
            markRowComplete(row);
          } else {
            markedRows.delete(payload.rowId);
            const line = document.querySelector(`.sharpie-line-element[data-row-id="${payload.rowId}"]`);
            if (line) line.remove();
            unmarkRowComplete(row);
          }
        })
        .on('broadcast', { event: 'sharpie-visibility' }, ({ payload }) => {
          if (payload.hidden) {
            sharpieVisible = false;
            document.body.classList.add('sharpie-hidden');
            document.body.classList.remove('show-progress');
            document.getElementById('sharpieToggle')?.classList.add('lines-hidden');
          } else {
            sharpieVisible = true;
            document.body.classList.remove('sharpie-hidden');
            document.body.classList.add('show-progress');
            document.getElementById('sharpieToggle')?.classList.remove('lines-hidden');
          }
        })
        .on('broadcast', { event: 'full-sync' }, ({ payload }) => {
          if (payload?.sharpieRows) {
            // Clear existing sharpie lines
            document.querySelectorAll('.sharpie-line-element').forEach(el => el.remove());
            // Clear existing completed state from all rows
            document.querySelectorAll('#schedule-container tr.row-complete').forEach(tr => unmarkRowComplete(tr));
            markedRows.clear();

            payload.sharpieRows.forEach(rowId => {
              markedRows.add(rowId);
              const row = document.querySelector(`#schedule-container tr[data-id="${rowId}"]`);
              if (row) {
                addSharpieLineElement(row);
                markRowComplete(row);
              }
            });
          }
          // Sync sharpie visibility state from producer
          if (typeof payload?.linesHidden === 'boolean') {
            sharpieVisible = !payload.linesHidden;
            document.body.classList.toggle('sharpie-hidden', payload.linesHidden);
            document.body.classList.toggle('show-progress', !payload.linesHidden);
            document.getElementById('sharpieToggle')?.classList.toggle('lines-hidden', payload.linesHidden);
          }
        })
        .subscribe((status) => {
          if (status === 'SUBSCRIBED') {
            console.log('[Broadcast] Subscribed to sharpie channel, requesting sync...');
            sharpieChannel.send({
              type: 'broadcast',
              event: 'request-sync',
              payload: { source: 'broadcast-viewer' }
            });
          }
        });
      
      console.log('[Broadcast] Subscribing to sharpie channel: ad-sync-' + broadcastCode.toUpperCase());
    }
    
    function addSharpieLineElement(row) {
      const container = document.getElementById('schedule-container');
      if (!container) return;

      // Find the table containing this row (handles multi-day sections)
      const table = row.closest('table');
      if (!table) return;

      // Skip if row is in a hidden day section
      const section = row.closest('.broadcast-day-section');
      if (section && section.style.display === 'none') return;

      container.querySelector(`.sharpie-line-element[data-row-id="${row.dataset.id}"]`)?.remove();

      const line = document.createElement('div');
      line.className = 'sharpie-line-element';
      line.dataset.rowId = row.dataset.id;

      const containerRect = container.getBoundingClientRect();
      const rowRect = row.getBoundingClientRect();

      line.style.position = 'absolute';
      line.style.top = (rowRect.top - containerRect.top + rowRect.height / 2 - 2) + 'px';
      line.style.left = '0px';
      line.style.width = table.offsetWidth + 'px';

      if (getComputedStyle(container).position === 'static') {
        container.style.position = 'relative';
      }

      container.appendChild(line);
    }

    /** Mark a row as completed — adds class + inserts .completed-line span if missing */
    function markRowComplete(row) {
      row.classList.add('row-complete');
      row.dataset.completed = 'true';
      // Insert a .completed-line span into first visible TD if not already present
      if (!row.querySelector('.completed-line')) {
        const tds = row.querySelectorAll('td');
        let firstTd = null;
        for (const td of tds) {
          if (td.style.display !== 'none') { firstTd = td; break; }
        }
        if (firstTd) {
          const span = document.createElement('span');
          span.className = 'completed-line';
          span.setAttribute('data-row-line', 'true');
          firstTd.style.position = 'relative';
          firstTd.style.overflow = 'visible';
          firstTd.insertBefore(span, firstTd.firstChild);
        }
      }
    }

    /** Remove completed state from a row */
    function unmarkRowComplete(row) {
      row.classList.remove('row-complete');
      delete row.dataset.completed;
      const span = row.querySelector('.completed-line');
      if (span) span.remove();
    }


    function updateLiveBadge(isLive) {
      const badge = document.getElementById('liveBadge');
      const text = document.getElementById('liveText');
      
      badge.classList.remove('live', 'manual', 'offline');
      
      if (isLive) {
        badge.classList.add('live');
        text.textContent = 'LIVE';
      } else {
        badge.classList.add('manual');
        text.textContent = 'MANUAL';
      }
    }
    
    function showError(msg) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('schedule-container').style.display = 'none';
      document.getElementById('error').style.display = 'flex';
      document.getElementById('error').querySelector('p').textContent = msg;
      
      const badge = document.getElementById('liveBadge');
      const text = document.getElementById('liveText');
      badge.classList.remove('live', 'manual');
      badge.classList.add('offline');
      text.textContent = 'OFFLINE';
    }
    
    init();
    })();
  </script>
</body>
</html>
